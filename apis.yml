apis:
  - aid: bls-gov:bls-public-data-api
    name: BLS Public Data API
    description: >-
      The BLS Public Data API is the agency's public REST + JSON service for retrieving published historical time series
      across every BLS program. v1 is open and unauthenticated with smaller daily limits and per-request caps; v2
      requires a free registration key and unlocks 500 queries per day, up to 50 series per request, up to 20 years per
      query, optional catalog metadata, net/percent-change calculations, and annual averages. All requests return a
      uniform JSON envelope with status, responseTime, and Results.series, where each series carries data points keyed
      by year and period (M01–M12 for monthly, Q01–Q04 for quarterly, S01–S03 for semi annual, A01 for annual, M13 for
      annual averages).
    humanURL: https://www.bls.gov/developers/home.htm
    baseURL: https://api.bls.gov/publicAPI/v2
