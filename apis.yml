aid: bls-gov
name: Bureau of Labor Statistics
description: >-
  The U.S. Bureau of Labor Statistics (BLS) is the principal federal statistical agency responsible for measuring labor
  market activity, working conditions, price changes, and productivity in the U.S. economy. BLS operates the Public Data
  API at api.bls.gov, providing programmatic JSON access to published historical time series across more than 75 surveys
  — including the Consumer Price Index (CPI), Producer Price Index (PPI), Employment Situation (CES), Local Area
  Unemployment Statistics (LAUS), Quarterly Census of Employment and Wages (QCEW), Occupational Employment and Wage
  Statistics (OEWS), Employment Cost Index (ECI), Productivity, Import/Export Price Indexes, and Census of Fatal
  Occupational Injuries (CFOI). Version 1 is open without registration; Version 2 requires a free registration key and
  provides higher daily limits, more series per request, longer year ranges, catalog metadata, statistical calculations,
  and annual averages.
